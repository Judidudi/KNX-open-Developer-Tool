<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <circle cx="32" cy="32" r="30" fill="#1e1e1e" stroke="#E87722" stroke-width="2.5"/>
  <!-- "KNX" label -->
  <text x="32" y="20" text-anchor="middle" font-family="sans-serif" font-weight="bold"
        font-size="11" fill="#E87722" letter-spacing="1">KNX</text>
  <!-- Divider -->
  <line x1="10" y1="25" x2="54" y2="25" stroke="#E87722" stroke-width="1" opacity="0.4"/>
  <!-- KNX bus topology: horizontal bus line -->
  <line x1="10" y1="36" x2="54" y2="36" stroke="#E87722" stroke-width="3" stroke-linecap="round"/>
  <!-- Device nodes on bus -->
  <circle cx="18" cy="36" r="4" fill="#E87722"/>
  <circle cx="32" cy="36" r="4" fill="#E87722"/>
  <circle cx="46" cy="36" r="4" fill="#E87722"/>
  <!-- Drop lines -->
  <line x1="18" y1="40" x2="18" y2="50" stroke="#f5a050" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="32" y2="50" stroke="#f5a050" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="40" x2="46" y2="50" stroke="#f5a050" stroke-width="2" stroke-linecap="round"/>
  <!-- Device rectangles -->
  <rect x="13" y="50" width="10" height="7" rx="2" fill="#E87722"/>
  <rect x="27" y="50" width="10" height="7" rx="2" fill="#E87722"/>
  <rect x="41" y="50" width="10" height="7" rx="2" fill="#E87722"/>
</svg>
