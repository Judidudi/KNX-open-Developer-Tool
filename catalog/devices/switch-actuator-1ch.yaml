id: "switch-actuator-1ch"
version: "1.0.0"
manufacturer: "OpenKNX"
name:
  de: "Schaltaktor 1-fach"
  en: "Switch Actuator 1-channel"
hardware:
  target: "STM32G0B1"
  transceiver: "NCN5120"
channels:
  - id: ch1
    name:
      de: "Kanal 1"
      en: "Channel 1"
comObjects:
  - id: co_switch_ch1
    number: 0
    channel: ch1
    name:
      de: "Schalten"
      en: "Switch"
    dpt: "1.001"
    flags: [C, W, T, U]
  - id: co_status_ch1
    number: 1
    channel: ch1
    name:
      de: "Statusrückmeldung"
      en: "Status feedback"
    dpt: "1.001"
    flags: [C, R, T]
parameters:
  - id: p_startup_delay
    name:
      de: "Einschaltverzögerung"
      en: "Startup delay"
    type: uint16
    unit: ms
    default: 0
    range: [0, 30000]
    memoryOffset: 0
    size: 2
  - id: p_startup_value
    name:
      de: "Einschaltwert"
      en: "Startup value"
    type: enum
    default: 0
    memoryOffset: 2
    size: 1
    values:
      - value: 0
        label: { de: "Aus", en: "Off" }
      - value: 1
        label: { de: "Ein", en: "On" }
      - value: 2
        label: { de: "Letzter Wert", en: "Last value" }
  - id: p_invert
    name:
      de: "Ausgang invertieren"
      en: "Invert output"
    type: bool
    default: 0
    memoryOffset: 3
    size: 1
memoryLayout:
  addressTable:     "0x4000"
  associationTable: "0x4100"
  comObjectTable:   "0x4200"
  parameterBase:    "0x4400"
  parameterSize:    4
